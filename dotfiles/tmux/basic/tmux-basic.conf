##### ------------------------------------------------------------
#####  BASIC TMUX CONFIG — CLEAN & MINIMAL
#####  Prefix: Ctrl + a (primary), Ctrl + b (secondary)
#####  Purpose:
#####    - Lightweight tmux experience
#####    - No custom layouts
#####    - No floating help popup
#####    - No project-aware sessions
##### ------------------------------------------------------------


##### ------------------------------------------------------------
#####  PREFIX KEYS
##### ------------------------------------------------------------

# Primary prefix (modern, ergonomic)
set -g prefix C-a

# Secondary prefix (classic tmux compatibility)
set-option -g prefix2 C-b


##### ------------------------------------------------------------
#####  GENERAL SETTINGS
##### ------------------------------------------------------------

# Enable mouse support (scrolling, pane selection, resizing)
set -g mouse on

# Increase scrollback history
set -g history-limit 5000

# Start window and pane numbering at 1 (more intuitive)
set -g base-index 1
setw -g pane-base-index 1

# Use Vim-style keys in copy mode
setw -g mode-keys vi


##### ------------------------------------------------------------
#####  STATUS BAR
##### ------------------------------------------------------------

# Simple, clean status bar
set -g status-bg black
set -g status-fg white

# Left side: session name
set -g status-left "#S"

# Right side: date + time
set -g status-right "%Y-%m-%d %H:%M"
