source-file ~/dotfiles/tmux/detect-os.conf

##### ------------------------------------------------------------
#####  PRO TMUX CONFIG — FULL IDE MODE
#####  Prefix: Ctrl + a (primary), Ctrl + b (secondary)
#####  Features:
#####    - Custom navigation + resizing
#####    - Workspace layouts
#####    - Manyfold + Docker dashboards
#####    - Floating help popup
#####    - OS detection
##### ------------------------------------------------------------

# Load OS detection (macOS vs Linux)
source-file ~/dotfiles/tmux/detect-os.conf


##### ------------------------------------------------------------
#####  PREFIX KEYS
##### ------------------------------------------------------------

# Primary prefix (ergonomic)
set -g prefix C-a

# Secondary prefix (for compatibility)
set-option -g prefix2 C-b


##### ------------------------------------------------------------
#####  GENERAL SETTINGS
##### ------------------------------------------------------------

# Enable mouse support
set -g mouse on

# Increase scrollback history
set -g history-limit 10000

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1


##### ------------------------------------------------------------
#####  PANE NAVIGATION (Vim-style)
##### ------------------------------------------------------------

# Move between panes with Ctrl + h/j/k/l
bind -n C-h select-pane -L
bind -n C-j select-pane -D
bind -n C-k select-pane -U
bind -n C-l select-pane -R


##### ------------------------------------------------------------
#####  PANE RESIZING
##### ------------------------------------------------------------

# Resize panes using Alt + Arrow Keys
bind -n M-Left  resize-pane -L 3
bind -n M-Right resize-pane -R 3
bind -n M-Up    resize-pane -U 3
bind -n M-Down  resize-pane -D 3


##### ------------------------------------------------------------
#####  WINDOW MANAGEMENT
##### ------------------------------------------------------------

# Create new window
bind c new-window

# Rename current window
bind , command-prompt "rename-window %%"


##### ------------------------------------------------------------
#####  STATUS BAR
##### ------------------------------------------------------------

set -g status-bg black
set -g status-fg white

# Allow longer left/right sections
set -g status-left-length 40
set -g status-right-length 80

# Left: session name
set -g status-left "#[fg=green]#S #[fg=white]"

# Right: date + time
set -g status-right "#[fg=cyan]%Y-%m-%d #[fg=yellow]%H:%M"


##### ------------------------------------------------------------
#####  COPY MODE (VI)
##### ------------------------------------------------------------

setw -g mode-keys vi

# Start selection with 'v'
bind -T copy-mode-vi v send -X begin-selection

# Yank selection with 'y'
bind -T copy-mode-vi y send -X copy-selection-and-cancel


##### ------------------------------------------------------------
#####  WORKSPACE LAYOUTS
##### ------------------------------------------------------------

# Default 3-pane workspace
bind w run-shell "tmux new-window -n workspace 'tmux split-window -h; tmux split-window -v; tmux select-pane -t 1'"


##### ------------------------------------------------------------
#####  MANYFOLD OPERATOR DASHBOARD
##### ------------------------------------------------------------

# Logs + incoming folder + shell
bind m run-shell "tmux new-window -n manyfold 'tmux split-window -h \"tail -f /var/lib/manyfold/log/production.log\"; tmux split-window -v \"ls -l ~/manyfold/incoming\"; tmux select-pane -t 3'"


##### ------------------------------------------------------------
#####  DOCKER DASHBOARD
##### ------------------------------------------------------------

# docker ps + logs + shell
bind d run-shell "tmux new-window -n docker 'tmux split-window -h \"docker ps\"; tmux split-window -v \"docker logs -f manyfold\"; tmux select-pane -t 3'"


##### ------------------------------------------------------------
#####  FLOATING HELP POPUP
##### ------------------------------------------------------------

# Opens help.md in a popup window
bind h display-popup -w 70% -h 70% -B rounded "sh -c 'less \"$HOME/dotfiles/tmux/help.md\"'"


